services:
  mysql:
    image: mysql:8.4
    container_name: geo-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: geo
      MYSQL_USER: geo_user
      MYSQL_PASSWORD: geo_password
      MYSQL_ROOT_PASSWORD: root_password
    ports:
      - '3306:3306'
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ['CMD-SHELL', 'mysqladmin ping -h localhost -uroot -proot_password']
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: geo-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: mysql://geo_user:geo_password@mysql:3306/geo
      PORT: 4000
      CORS_ORIGIN: http://localhost:5173
    ports:
      - '4000:4000'
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:4000/api
    container_name: geo-frontend
    restart: unless-stopped
    ports:
      - '5173:5173'
    depends_on:
      - backend

volumes:
  mysql-data:
